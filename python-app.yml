name: Python Calculator CI

# WHEN this workflow runs
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# WHAT it does
jobs:
  build-and-test:
    runs-on: ubuntu-latest   # GitHub gives us a fresh Linux machine for this job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4        # copies your repo code onto that machine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'         # installs Python 3.11 on the runner

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest test_calculator.py -v
